            // Hàm phân tích dữ liệu CSV
            function parseCSV(text) {
                let p = '', row = [''], ret = [row], i = 0, r = 0, s = !0, l;
                for (l of text) {
                    if ('"' === l) {
                        if (s && l === p) row[i] += l;
                        s = !s;
                    } else if (',' === l && s) l = row[++i] = '';
                    else if ('\n' === l && s) {
                        if ('\r' === p) row[i] = row[i].slice(0, -1);
                        row = ret[++r] = [l = '']; i = 0;
                    } else row[i] += l;
                    p = l;
                }
                
                // Loại bỏ tiêu đề
                ret.shift();
                
                // Map dữ liệu vào object dựa trên cấu trúc cột:
                // 0: STT, 1: Email, 2: Họ và Tên, 8: Nơi sinh, 9: CCCD, 10: Điện thoại, 11: Địa chỉ liên hệ, 12: Trình độ
                return ret.map(col => ({
                    email: col[1] ? col[1].trim() : '',
                    name: col[2] ? col[2].trim() : '',
                    dob: col[5] ? col[5].trim() : '',
                    gender: col[6] ? col[6].trim() : '',
                    pob: col[8] ? col[8].trim() : '', // Nơi sinh
                    cccd: col[9] ? col[9].trim() : '',
                    phone: col[10] ? col[10].trim() : '',
                    address: col[11] ? col[11].trim() : '',
                    level: col[12] ? col[12].trim() : '',
                    note: col[13] ? col[13].trim() : ''
                })).filter(item => item.cccd !== '');
            }

            const candidates = parseCSV(csvData);
